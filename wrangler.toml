# Principal informations
name = "dashboard"
main = "src/index.js"
compatibility_date = "2026-05-22"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

# Environement variables
[vars]
MODE = "production" # -> "production" if enabled, or any other name if disabled
SITE = "enabled" # -> "enabled" if enabled, or any other name if disabled
TURNSTILE_SITE_KEY = "0x4AAAAAADrlHr788EQ3YFx3" # -> Turnstile site key

# Production environment
[env.production]
vars = { JWT_SECRET = "generate-a-secure-random-key" }

# Static site
[assets]
directory = "./src/frontend"
binding = "ASSETS"

# Worker AI
[ai]
binding = "AI"

# Worker executed before assets
run_worker_first = [
  "/api/ed",
  "/api/config",
  "/api/auth",
  "/api/pomodoro",
  "/pages/auth",
  "/pages/auth/",
  "/pages/error-token",
  "/pages/error-token/",
  "/pages/home",
  "/pages/home/",
  "/pages/workspace",
  "/pages/workspace/",
  "/pages/artificial-intelligence",
  "/pages/artificial-intelligence/",
  "/pages/files",
  "/pages/files/",
  "/pages/tools",
  "/pages/tools/",
  "/pages/settings",
  "/pages/settings/"
]

# Workflows
[[workflows]]
name = "check_grades"
binding = "CHECK_GRADES"
class_name = "CheckGradesWorkflow"

# Observability
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1
