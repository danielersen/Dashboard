<!doctype html>
<html lang="en" data-auth-pending>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#08100f">
    <title>AI</title>
    <meta name="description" content="AI: Chat, search web, reasoning, and picture generation.">
    <style>html[data-auth-pending] body { visibility: hidden; }</style>
    <script type="module">
      import { guardPage } from "/lib/auth.js";
      guardPage().then((ok) => {
        if (ok) document.documentElement.removeAttribute("data-auth-pending");
      });
    </script>
    <link rel="stylesheet" href="/pages/AI/style.css">
    <link rel="icon" href="/assets/logo/websitelogo.png">
    <script type="module" src="/components/navbar/navbar.js"></script>
    <script type="module" src="/pages/AI/script.js"></script>
  </head>
  <body>
    <site-navbar current="AI"></site-navbar>

    <div class="ai-shell">
      <aside class="ai-sidebar" aria-label="AI sections">
        <button class="ai-nav" type="button" data-target="ai" aria-label="AI" data-active="true">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm1-13h-2v6h6v-2h-4z"></path>
          </svg>
        </button>
        <button class="ai-nav" type="button" data-target="search-web" aria-label="Search Web">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19zm-6 0a4.5 4.5 0 1 1 4.5-4.5A4.5 4.5 0 0 1 9.5 14z"></path>
          </svg>
        </button>
        <button class="ai-nav" type="button" data-target="reasoning" aria-label="Reasoning">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2l-5.5 9h11z"></path>
            <path d="M12 22l-5.5-9h11z"></path>
            <circle cx="12" cy="11" r="2"></circle>
          </svg>
        </button>
        <button class="ai-nav" type="button" data-target="pictures" aria-label="Pictures Generator">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="2"></rect>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"></circle>
            <path d="M21 15l-5-5L5 21" fill="none" stroke="currentColor" stroke-width="2"></path>
          </svg>
        </button>
      </aside>

      <main class="ai-main">
        <!-- ===================== AI ===================== -->
        <section id="ai" class="ai-section" aria-label="AI">
          <header class="section-head">
            <h1>AI Assistant</h1>
          </header>
          <div class="ai-container">
            <div class="ai-model-selector">
              <label for="ai-model-select">Model</label>
              <select id="ai-model-select" data-model-select>
                <option value="">Loading models...</option>
              </select>
              <span class="model-consumption" data-consumption>Consumption: --</span>
            </div>
            <div class="ai-prompt-area">
              <textarea id="ai-prompt" data-prompt placeholder="Enter your prompt..." rows="4"></textarea>
              <button id="ai-submit" data-submit type="button">Send</button>
            </div>
            <div class="ai-response" data-response>
              <p class="state-msg">Your response will appear here.</p>
            </div>
          </div>
        </section>

        <!-- ===================== SEARCH WEB ===================== -->
        <section id="search-web" class="ai-section" aria-label="Search Web" hidden>
          <header class="section-head">
            <h1>Search Web</h1>
          </header>
          <div class="ai-container">
            <div class="ai-model-selector">
              <label for="search-web-model-select">Model</label>
              <select id="search-web-model-select" data-model-select>
                <option value="">Loading models...</option>
              </select>
              <span class="model-consumption" data-consumption>Consumption: --</span>
            </div>
            <div class="ai-prompt-area">
              <textarea id="search-web-prompt" data-prompt placeholder="Enter your search query..." rows="4"></textarea>
              <button id="search-web-submit" data-submit type="button">Search</button>
            </div>
            <div class="ai-response" data-response>
              <p class="state-msg">Search results will appear here.</p>
            </div>
          </div>
        </section>

        <!-- ===================== REASONING ===================== -->
        <section id="reasoning" class="ai-section" aria-label="Reasoning" hidden>
          <header class="section-head">
            <h1>Reasoning</h1>
          </header>
          <div class="ai-container">
            <div class="ai-model-selector">
              <label for="reasoning-model-select">Model</label>
              <select id="reasoning-model-select" data-model-select>
                <option value="">Loading models...</option>
              </select>
              <span class="model-consumption" data-consumption>Consumption: --</span>
            </div>
            <div class="ai-prompt-area">
              <textarea id="reasoning-prompt" data-prompt placeholder="Enter your reasoning task..." rows="4"></textarea>
              <button id="reasoning-submit" data-submit type="button">Reason</button>
            </div>
            <div class="ai-response" data-response>
              <p class="state-msg">Reasoning results will appear here.</p>
            </div>
          </div>
        </section>

        <!-- ===================== PICTURES ===================== -->
        <section id="pictures" class="ai-section" aria-label="Pictures Generator" hidden>
          <header class="section-head">
            <h1>Picture Generator</h1>
          </header>
          <div class="ai-container">
            <div class="ai-model-selector">
              <label for="pictures-model-select">Model</label>
              <select id="pictures-model-select" data-model-select>
                <option value="">Loading models...</option>
              </select>
              <span class="model-consumption" data-consumption>Consumption: --</span>
            </div>
            <div class="ai-prompt-area">
              <textarea id="pictures-prompt" data-prompt placeholder="Describe the image you want to generate..." rows="4"></textarea>
              <button id="pictures-submit" data-submit type="button">Generate</button>
            </div>
            <div class="ai-response" data-response>
              <p class="state-msg">Generated image or description will appear here.</p>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
