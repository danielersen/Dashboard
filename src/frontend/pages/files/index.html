<!doctype html>
<html lang="fr" data-auth-pending>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#08100f">
    <title>Files - Daniel Ersen Dashboard</title>
    <meta name="description" content="Manage your files - Upload, organize and access your files with a modern file manager interface.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://dashboard.danielersen.fr.eu.org/files">
    <link rel="icon" href="/assets/logo/square.png">
    <link rel="manifest" href="/seo/manifest.json">
    <meta name="msapplication-config" content="/seo/browserconfig.xml">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://dashboard.danielersen.fr.eu.org/files">
    <meta property="og:title" content="Files - Daniel Ersen Dashboard">
    <meta property="og:description" content="Manage your files - Upload, organize and access your files with a modern file manager interface.">
    <meta property="og:image" content="https://dashboard.danielersen.fr.eu.org/assets/logo/main.png">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://dashboard.danielersen.fr.eu.org/files">
    <meta property="twitter:title" content="Files - Daniel Ersen Dashboard">
    <meta property="twitter:description" content="Manage your files - Upload, organize and access your files with a modern file manager interface.">
    <meta property="twitter:image" content="https://dashboard.danielersen.fr.eu.org/assets/logo/main.png">
    
    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Files",
      "url": "https://dashboard.danielersen.fr.eu.org/files",
      "description": "Manage your files - Upload, organize and access your files with a modern file manager interface.",
      "isPartOf": {
        "@type": "WebSite",
        "name": "Daniel Ersen Dashboard",
        "url": "https://dashboard.danielersen.fr.eu.org/"
      },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://dashboard.danielersen.fr.eu.org/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Files",
            "item": "https://dashboard.danielersen.fr.eu.org/files"
          }
        ]
      }
    }
    </script>
    
    <style>html[data-auth-pending] body { visibility: hidden; }</style>
    <script type="module">
      import { guardPage } from "/lib/auth.js";
      document.documentElement.removeAttribute("data-auth-pending");
      guardPage().then((ok) => {
        if (!ok) {
          window.location.href = '/pages/auth';
        }
      });
    </script>
    <link rel="stylesheet" href="/styles/sidebar.css">
    <link rel="stylesheet" href="/styles/block.css">
    <link rel="stylesheet" href="/pages/files/style.css">
    <script type="module" src="/components/navbar.js"></script>
    <script type="module" src="/pages/files/icons.js"></script>
    <script type="module" src="/pages/files/script.js"></script>
  </head>
  <body>
    <site-navbar current="files"></site-navbar>

    <div class="files-shell">
      <aside class="files-sidebar" aria-label="Files actions">
        <button class="files-nav" type="button" id="create-folder-btn" aria-label="Create folder">
          <span class="files-icon" data-icon="/assets/icons/plus.svg"></span>
        </button>
        <button class="files-nav" type="button" id="upload-btn" aria-label="Upload file" style="display: none;">
          <span class="files-icon" data-icon="/assets/icons/upload.svg"></span>
        </button>
      </aside>

      <main class="files-main">
        <div class="files-header">
          <h1 class="files-title">My Files</h1>
        </div>
        
        <div class="bento-block files-container">
          <div class="files-list" id="files-list">
            <!-- Files and folders will be populated by JS -->
          </div>
        </div>
      </main>
    </div>

    <!-- Upload Modal -->
    <div class="modal" id="upload-modal" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2 class="modal-title">Upload File</h2>
        <form id="upload-form">
          <div class="form-group">
            <label for="file-input">Select File</label>
            <input type="file" id="file-input" name="file" required>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cancel-upload-btn">Cancel</button>
            <button type="submit" class="btn-primary">Upload</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Create Folder Modal -->
    <div class="modal" id="folder-modal" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2 class="modal-title">Create Folder</h2>
        <form id="folder-form">
          <div class="form-group">
            <label for="folder-name">Folder Name</label>
            <input type="text" id="folder-name" name="name" required placeholder="Folder name">
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-secondary" id="cancel-folder-btn">Cancel</button>
            <button type="submit" class="btn-primary">Create</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div class="modal" id="delete-modal" aria-hidden="true">
      <div class="modal-backdrop"></div>
      <div class="modal-content">
        <h2 class="modal-title">Delete Item</h2>
        <p class="modal-message">Are you sure you want to delete this item?</p>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancel-delete-btn">No</button>
          <button type="button" class="btn-danger" id="confirm-delete-btn">Yes</button>
        </div>
      </div>
    </div>

    <!-- Hidden file input for upload -->
    <input type="file" id="hidden-file-input" style="display: none;">
  </body>
</html>
