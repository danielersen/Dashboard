<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#08100f">
    <title>Home</title>
    <link rel="stylesheet" href="/pages/home/style.css">
    <script type="module" src="/components/navbar/navbar.js"></script>
  </head>
  <body>
    <site-navbar current="home"></site-navbar>

    <main class="home-shell">
      <section class="bento-grid" aria-label="Accueil">
        <article class="bento-block block-greeting">
          <p class="block-eyebrow">Bienvenue</p>
          <h1>Hello Daniel</h1>
        </article>

        <article class="bento-block block-mesh" aria-label="Forme 3D animée">
          <canvas id="meshCanvas" aria-hidden="true"></canvas>
        </article>

        <article class="bento-block block-status">
          <p class="block-eyebrow">Home</p>
          <strong class="status-title">Tableau de bord</strong>
          <p class="status-sync">
            Dernière synchronisation&nbsp;:
            <span id="syncLabel">--:--</span>
          </p>
        </article>

        <article class="bento-block block-logo">
          <img src="/assets/icons/logo.png" alt="Logo Dashboard" class="home-logo">
        </article>

        <a class="bento-block block-link" href="/pages/workspace">
          <span class="block-eyebrow">Workspace</span>
          <strong>School</strong>
        </a>

        <a class="bento-block block-link" href="/pages/artificial-intelligence">
          <span class="block-eyebrow">Artificial Intelligence</span>
          <strong>Intelligence</strong>
        </a>

        <a class="bento-block block-link" href="/pages/files">
          <span class="block-eyebrow">Files storage</span>
          <strong>Base of files</strong>
        </a>

        <a class="bento-block block-link" href="/pages/tools">
          <span class="block-eyebrow">Useful tools</span>
          <strong>Tools</strong>
        </a>

        <a class="bento-block block-link" href="/pages/personalisation">
          <span class="block-eyebrow">Personnalisation</span>
          <strong>Settings</strong>
        </a>
      </section>

      <p class="home-footer">Designed by AI and managed by Daniel Ersen</p>
    </main>
    <script type="module" src="/pages/home/script.js"></script>
  </body>
</html>
